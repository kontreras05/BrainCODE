<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainCode</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         oklch(95.5% 0.014 62);
  --surface:    oklch(99.2% 0.005 58);
  --surface-2:  oklch(97%   0.01  60);
  --sidebar:    oklch(14%   0.022 55);
  --sidebar-2:  oklch(18%   0.022 55);
  --sidebar-3:  oklch(22%   0.022 55);
  --text:       oklch(17%   0.025 55);
  --text-mid:   oklch(46%   0.03  58);
  --text-muted: oklch(60%   0.022 58);
  --border:     oklch(90%   0.016 62);
  --border-2:   oklch(84%   0.022 62);
  --green:      oklch(52%   0.13  155);
  --green-bg:   oklch(95%   0.055 155);
  --green-glow: oklch(68%   0.13  155);
  --red:        oklch(57%   0.18  25);
  --red-bg:     oklch(96%   0.06  25);
  --amber:      oklch(64%   0.16  65);
  --amber-bg:   oklch(95%   0.07  65);
  --slate:      oklch(58%   0.02  60);
  --slate-bg:   oklch(93%   0.01  60);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;overflow:hidden;}

/* ── WINDOW ── */
.window{width:960px;height:640px;background:var(--surface);border-radius:18px;box-shadow:0 32px 80px oklch(10% 0.03 55 / 0.26),0 0 0 1px oklch(80% 0.02 60 / 0.45);display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:192px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid oklch(100% 0 0 / 0.05);}
.sb-titlebar{height:48px;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:1px solid oklch(100% 0 0 / 0.06);user-select:none;flex-shrink:0;}
.tls{display:flex;gap:6px;}
.tl{width:11px;height:11px;border-radius:50%;}
.tl-r{background:#ff5f57;}.tl-y{background:#febc2e;}.tl-g{background:#28c840;}
.brand{font-size:13px;font-weight:700;color:oklch(88% 0.012 60);letter-spacing:0.01em;}
.brand em{font-style:normal;color:var(--green-glow);font-weight:700;}

/* Score orb */
.orb-wrap{padding:16px 16px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid oklch(100% 0 0 / 0.06);}
.orb{width:76px;height:76px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;background:oklch(52% 0.13 155 / 0.12);border:1.5px solid oklch(52% 0.13 155 / 0.32);}
.orb-num{font-size:24px;font-weight:700;color:var(--green-glow);line-height:1;}
.orb-sub{font-size:9px;font-weight:600;color:oklch(65% 0.08 155);text-transform:uppercase;letter-spacing:0.1em;}
.orb-stats{display:flex;flex-direction:column;align-items:center;gap:4px;}
.orb-time{font-size:12px;font-weight:500;color:oklch(68% 0.02 60);}
.orb-streak{font-size:11px;font-weight:600;color:oklch(68% 0.1 55);display:flex;align-items:center;gap:4px;}

/* Nav */
.nav{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;color:oklch(58% 0.02 60);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;transition:all 0.15s;}
.nav-btn:hover{background:var(--sidebar-2);color:oklch(80% 0.015 60);}
.nav-btn.active{background:var(--sidebar-3);color:oklch(91% 0.01 60);}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;opacity:0.8;}

/* Sidebar bottom */
.sb-bottom{padding:10px 8px;border-top:1px solid oklch(100% 0 0 / 0.06);display:flex;flex-direction:column;gap:2px;}
.cam-status{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;width:100%;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;color:oklch(56% 0.02 60);transition:all 0.15s;text-align:left;}
.cam-status:hover{background:var(--sidebar-2);color:oklch(74% 0.015 60);}
.cam-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background 0.3s;}
.cam-dot.live{animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.main-bar{height:48px;display:flex;align-items:center;padding:0 20px;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.main-bar-title{font-size:13px;font-weight:600;color:var(--text);}
.main-bar-sub{font-size:12px;color:var(--text-muted);font-weight:400;}
.icon-btn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:var(--text-muted);transition:all 0.15s;margin-left:auto;}
.icon-btn:hover{background:var(--surface-2);color:var(--text);}
.icon-btn:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

/* ── MONITOR ── */
.monitor{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px;position:relative;overflow:hidden;}

.ambient{position:absolute;width:440px;height:440px;border-radius:50%;filter:blur(90px);pointer-events:none;transition:background 1.4s ease,opacity 1.4s ease;}

.ring-wrap{position:relative;width:300px;height:300px;flex-shrink:0;z-index:1;}
.ring-svg{transform:rotate(-90deg);overflow:visible;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}

.timer{font-family:'JetBrains Mono',monospace;font-size:58px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;transition:color 0.5s;font-variant-numeric:tabular-nums;}
.timer.brk{color:var(--green);}
.timer.free{color:var(--text-mid);}

.timer-lbl{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.09em;}
.state-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;margin-top:2px;transition:all 0.5s;}
.state-chip-dot{width:6px;height:6px;border-radius:50%;animation:blink 2s infinite;}
.state-chip-label{font-size:11px;font-weight:600;}

.ring-info{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:14px;z-index:1;min-height:72px;}
.idle-title{font-size:14px;font-weight:600;color:var(--text-mid);}
.idle-hint{font-size:12px;color:var(--text-muted);text-align:center;line-height:1.5;max-width:160px;}

/* Session setup */
.setup{z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:22px;animation:up 0.25s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.mode-row{display:flex;gap:8px;}
.mode-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;border:1.5px solid var(--border-2);background:var(--surface);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);transition:all 0.2s;box-shadow:0 2px 6px oklch(0% 0 0/0.05);}
.mode-btn:hover{border-color:var(--green);color:var(--green);transform:translateY(-1px);box-shadow:0 4px 16px oklch(52% 0.13 155/0.15);}
.mode-btn.pri{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 16px oklch(52% 0.13 155/0.32);}
.mode-btn.pri:hover{background:oklch(48% 0.13 155);box-shadow:0 6px 22px oklch(52% 0.13 155/0.42);}
.mode-btn:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.config-row{display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:10px 16px;animation:up 0.2s ease;}
.cfg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-mid);}
.cfg-lbl{font-weight:500;}
.cfg-inp{width:44px;padding:4px 6px;border:1px solid var(--border-2);border-radius:6px;font-size:12px;font-weight:700;text-align:center;color:var(--text);background:var(--surface);font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color 0.15s;}
.cfg-inp:focus{border-color:var(--green);}
.cfg-unit{font-size:11px;color:var(--text-muted);}
.cfg-sep{width:1px;height:22px;background:var(--border);}
.cfg-go{background:var(--green);color:#fff;border:none;padding:7px 16px;border-radius:999px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.cfg-go:hover{background:oklch(48% 0.13 155);transform:translateY(-1px);}
.cfg-go:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

/* Active controls */
.controls{z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:22px;animation:up 0.2s ease;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.ctrl-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;transition:all 0.2s;}
.ctrl-btn.pp{background:var(--green);color:#fff;box-shadow:0 4px 14px oklch(52% 0.13 155/0.35);min-width:128px;justify-content:center;}
.ctrl-btn.pp:hover{transform:translateY(-1px);box-shadow:0 6px 20px oklch(52% 0.13 155/0.45);}
.ctrl-btn.pp:disabled{opacity:0.55;cursor:default;transform:none;}
.ctrl-btn.sec{background:var(--surface);border:1.5px solid var(--border-2);color:var(--text-mid);padding:10px 14px;}
.ctrl-btn.sec:hover{background:var(--surface-2);color:var(--text);}
.ctrl-btn.dng{background:transparent;border:1.5px solid var(--border);color:var(--text-muted);padding:10px 13px;}
.ctrl-btn.dng:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.ctrl-btn:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.kbd{display:inline-flex;align-items:center;justify-content:center;background:oklch(100% 0 0/0.2);border:1px solid oklch(100% 0 0/0.25);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;letter-spacing:0.04em;}

.pom-dots{display:flex;align-items:center;gap:6px;}
.pom-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border-2);transition:all 0.3s;}
.pom-dot.done{background:var(--green);border-color:var(--green);}
.pom-dot.curr{border-color:var(--green);background:oklch(52% 0.13 155/0.2);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(0.65)}}
.pom-info{font-size:11px;color:var(--text-muted);font-weight:500;margin-left:6px;}

/* Completion */
.done-state{display:flex;flex-direction:column;align-items:center;gap:6px;}
.done-emoji{font-size:38px;animation:bounce 0.6s ease;}
@keyframes bounce{0%{transform:scale(0.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.done-title{font-size:15px;font-weight:700;color:var(--text);}

/* Sparkles */
.spark{position:absolute;pointer-events:none;font-size:14px;animation:sparkle var(--d,1.2s) ease forwards;}
@keyframes sparkle{0%{opacity:0;transform:translate(0,0) scale(0)}40%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1)}100%{opacity:0;transform:translate(calc(var(--tx)*1.7),calc(var(--ty)*1.6)) scale(0.4)}}

/* ── CAMERA MODAL ── */
.cam-modal-wrap{position:absolute;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:flex-end;padding:16px;animation:up 0.2s ease;}
.cam-modal{width:220px;background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 16px 50px oklch(0% 0 0/0.18);overflow:hidden;}
.cam-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);}
.cam-title{font-size:12px;font-weight:700;color:var(--text);}
.cam-x{width:22px;height:22px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--text-muted);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.cam-x:hover{background:var(--surface-2);}
.cam-feed{margin:10px;border-radius:10px;overflow:hidden;background:#0d0b09;aspect-ratio:4/3;position:relative;border:1px solid oklch(100% 0 0/0.06);}
.cam-off-view{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:oklch(45% 0.02 55);font-size:11px;font-weight:600;}
.cam-live-view{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;background:#0a0806;}
.cam-scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,oklch(65% 0.13 155/0.8),transparent);animation:scan 2.5s linear infinite;}
@keyframes scan{0%{top:0}100%{top:100%}}
.face-box{width:46px;height:56px;border:2px solid oklch(65% 0.13 155/0.85);border-radius:6px;position:relative;transition:all 0.4s;}
.face-box.away{border-color:oklch(60% 0.18 25/0.8);transform:translateX(22px) rotate(12deg);}
.face-box.distracted{border-color:oklch(68% 0.16 65/0.8);transform:translateX(-14px);}
.face-box.absent{opacity:0;}
.fc{position:absolute;width:7px;height:7px;border-style:solid;}
.fc.tl{top:-2px;left:-2px;border-width:2px 0 0 2px;border-color:oklch(65% 0.13 155);border-radius:3px 0 0 0;}
.fc.tr{top:-2px;right:-2px;border-width:2px 2px 0 0;border-color:oklch(65% 0.13 155);border-radius:0 3px 0 0;}
.fc.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px;border-color:oklch(65% 0.13 155);border-radius:0 0 0 3px;}
.fc.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0;border-color:oklch(65% 0.13 155);border-radius:0 0 3px 0;}
.rec{position:absolute;top:6px;right:6px;width:5px;height:5px;border-radius:50%;background:#ff5f57;animation:blink 1s infinite;}
.cam-state-bar{display:flex;align-items:center;gap:8px;padding:8px 12px 12px;font-size:11px;font-weight:600;}
.cam-on-btn{background:var(--green);color:#fff;border:none;padding:5px 12px;border-radius:999px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;transition:background 0.15s;}
.cam-on-btn:hover{background:oklch(48% 0.13 155);}
.cam-off-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:4px 10px;border-radius:999px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;margin-left:auto;transition:all 0.15s;}
.cam-off-btn:hover{border-color:var(--border-2);color:var(--text-mid);}

/* ── METRICS ── */
.metrics{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
.metrics::-webkit-scrollbar{width:4px;}
.metrics::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}

.mhdr{display:flex;align-items:flex-start;justify-content:space-between;}
.mhdr-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.mhdr-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
.periods{display:flex;background:var(--surface-2);border-radius:999px;padding:3px;gap:2px;border:1px solid var(--border);}
.period{padding:4px 13px;border-radius:999px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.period.on{background:var(--surface);color:var(--green);box-shadow:0 1px 4px oklch(0% 0 0/0.08);}

.streak-card{background:linear-gradient(135deg,oklch(52% 0.13 155/0.08),oklch(52% 0.13 155/0.02));border:1px solid oklch(52% 0.13 155/0.22);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;}
.streak-fire{width:28px;height:28px;border-radius:8px;background:oklch(57% 0.18 25/0.12);border:1.5px solid oklch(57% 0.18 25/0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.streak-num{font-size:26px;font-weight:700;color:var(--red);line-height:1;}
.streak-lbl{font-size:12px;color:var(--text-muted);margin-top:2px;}
.streak-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid oklch(57% 0.18 25/0.2);white-space:nowrap;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;transition:all 0.2s;cursor:default;}
.stat-card:hover{border-color:var(--border-2);box-shadow:0 4px 16px oklch(0% 0 0/0.06);transform:translateY(-2px);}
.stat-top{display:flex;align-items:center;justify-content:space-between;}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;}
.stat-ico{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
.stat-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 0.8s ease;}
.stat-delta{font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;align-self:flex-start;}

.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.tl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.tl-title{font-size:13px;font-weight:600;color:var(--text);}
.tl-legend{display:flex;gap:12px;flex-wrap:wrap;}
.tl-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-weight:500;}
.tl-dot{width:8px;height:8px;border-radius:2px;}
.tl-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.tl-col{flex:1;display:flex;flex-direction:column;gap:2px;height:100%;justify-content:flex-end;}
.tl-seg{border-radius:3px;min-height:3px;}
.tl-lbl{text-align:center;font-size:10px;color:var(--text-muted);margin-top:6px;font-weight:500;}

/* ── JARS VIEW ── */
.jars-view{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:0;background:var(--surface-2);}
.jars-view::-webkit-scrollbar{width:4px;}
.jars-view::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
.shelf-header{margin-bottom:28px;}
.shelf-row{display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:0;}
.shelf-spacer{height:32px;}
.jar-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:default;transition:transform 0.22s;flex:1;padding:0 4px;}
.jar-item:hover{transform:translateY(-6px);}
.jar-svg-wrap{position:relative;width:80px;height:100px;flex-shrink:0;}
.jar-item-label{font-size:11px;font-weight:600;color:var(--text-mid);text-align:center;max-width:88px;line-height:1.35;}
.jar-item-meta{display:flex;align-items:center;gap:5px;}
.jar-item-score{font-size:12px;font-weight:700;}
.jar-item-date{font-size:10px;color:var(--text-muted);text-align:center;}

/* ── CAMERA VIEW ── */
.camera-view{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px;gap:16px;position:relative;}
.cam-big-feed{border-radius:16px;overflow:hidden;background:#0d0b09;position:relative;border:1px solid var(--border);width:340px;aspect-ratio:4/3;box-shadow:0 8px 30px oklch(0% 0 0/0.18);}
.cam-panel{width:340px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.cam-panel-state{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);}
.cam-log{padding:10px 14px;display:flex;flex-direction:column;gap:5px;}
.cam-log-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;}
.cam-log-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}
.cam-log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── TWEAKS PANEL ── */
.tweaks{position:absolute;bottom:16px;right:16px;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 40px oklch(0% 0 0/0.14);padding:14px;z-index:200;display:flex;flex-direction:column;gap:12px;animation:up 0.2s ease;}
.tweaks-hdr{display:flex;align-items:center;justify-content:space-between;}
.tweaks-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;}
.tweaks-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;font-weight:700;padding:0;transition:color 0.15s;}
.tweaks-close:hover{color:var(--text);}
.twk-row{display:flex;flex-direction:column;gap:5px;}
.twk-lbl{font-size:11px;color:var(--text-muted);font-weight:600;}
.twk-opts{display:flex;gap:4px;flex-wrap:wrap;}
.twk-opt{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;color:var(--text-mid);transition:all 0.15s;}
.twk-opt:hover{border-color:var(--border-2);}
.twk-opt.on{background:var(--green);border-color:var(--green);color:#fff;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ═══════════════ BRAIN SVG MASCOT ═══════════════ */
function BrainSVG({ blink, color = '#4a8a6a' }) {
  return (
    <svg viewBox="0 0 64 64" width="100%" height="100%" style={{position:'absolute',inset:0}}>
      <path d="M20 18C12 18 8 26 12 32 8 38 14 46 22 44 24 50 32 52 36 48 42 52 52 48 52 40 58 36 56 26 48 24 48 16 38 12 32 18 28 14 22 14 20 18Z"
        fill={color} stroke={color+'66'} strokeWidth="1" strokeLinejoin="round" opacity="0.88"/>
      <path d="M22 26Q26 28 24 32M28 22Q30 26 28 30M36 22Q34 26 36 30M42 26Q40 28 42 32M30 36Q32 38 34 36"
        fill="none" stroke={color+'99'} strokeWidth="1.2" strokeLinecap="round"/>
      {blink ? (
        <>
          <path d="M22 33Q25 35.5 28 33" stroke="#1a1208" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
          <path d="M36 33Q39 35.5 42 33" stroke="#1a1208" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        </>
      ) : (
        <>
          <ellipse cx="25" cy="33" rx="2.8" ry="3.2" fill="#fff"/>
          <ellipse cx="39" cy="33" rx="2.8" ry="3.2" fill="#fff"/>
          <circle cx="25.6" cy="33.6" r="1.5" fill="#1a1208"/>
          <circle cx="39.6" cy="33.6" r="1.5" fill="#1a1208"/>
          <circle cx="26.1" cy="33" r="0.55" fill="#fff"/>
          <circle cx="40.1" cy="33" r="0.55" fill="#fff"/>
        </>
      )}
      <ellipse cx="22" cy="40" rx="2.2" ry="1.3" fill={color+'88'} opacity="0.7"/>
      <ellipse cx="42" cy="40" rx="2.2" ry="1.3" fill={color+'88'} opacity="0.7"/>
    </svg>
  );
}

function BrainMascot({ size = 30, color = '#4a8a6a' }) {
  const [blink, setBlink] = useState(false);
  useEffect(() => {
    let t;
    function go() { t = setTimeout(() => { setBlink(true); setTimeout(() => { setBlink(false); go(); }, 140); }, 2500 + Math.random() * 4000); }
    go();
    return () => clearTimeout(t);
  }, []);
  return <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}><BrainSVG blink={blink} color={color} /></div>;
}

/* ═══════════════ RING ═══════════════ */
function arc(cx, cy, r, s, e) {
  if (Math.abs(e - s) < 0.001) return '';
  return `M ${cx + r * Math.cos(s)} ${cy + r * Math.sin(s)} A ${r} ${r} 0 ${e - s > Math.PI ? 1 : 0} 1 ${cx + r * Math.cos(e)} ${cy + r * Math.sin(e)}`;
}
function Ring({ segs, idle }) {
  const cx = 150, cy = 150, r = 116, sw = 30, TAU = 2 * Math.PI;
  let a = 0;
  const built = segs.map(s => { const o = { ...s, s0: a, s1: a + TAU * s.pct }; a = o.s1; return o; });
  const track = idle ? 'oklch(89% 0.016 62)' : 'oklch(91% 0.014 62)';
  return (
    <svg width="300" height="300" className="ring-svg" style={{ overflow: 'visible' }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={track} strokeWidth={sw}
        strokeDasharray={idle ? '4 9' : 'none'} strokeLinecap={idle ? 'round' : 'butt'} />
      {!idle && built.map((s, i) =>
        s.pct >= 0.005 && <path key={i} d={arc(cx, cy, r, s.s0, s.s1)} fill="none" stroke={s.color} strokeWidth={sw} strokeLinecap="round" opacity="0.88" />
      )}
    </svg>
  );
}

/* ═══════════════ STATE CONFIG ═══════════════ */
const STATES = ['working', 'away', 'social', 'absent'];
const CFG = {
  working: { hex: '#4a8a6a', label: 'Trabajando',     bg: 'oklch(52% 0.13 155 / 0.1)',  icon: '💻' },
  away:    { hex: '#c85540', label: 'Distraído',      bg: 'oklch(57% 0.18 25 / 0.1)',   icon: '👀' },
  social:  { hex: '#b87e28', label: 'Redes sociales', bg: 'oklch(64% 0.16 65 / 0.1)',   icon: '📱' },
  absent:  { hex: '#8a7a6a', label: 'Ausente',        bg: 'oklch(58% 0.02 60 / 0.1)',   icon: '😴' },
};

/* ═══════════════ SIM HOOK ═══════════════ */
function useSim(active) {
  const [state, setState] = useState('working');
  const [segs, setSegs] = useState({ working: 0.62, away: 0.12, social: 0.09, absent: 0.05 });
  const prev = useRef('working');
  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => {
      const next = STATES[Math.floor(Math.random() * STATES.length)];
      prev.current = next; setState(next);
      window.dispatchEvent(new CustomEvent('bc-state', { detail: next }));
      setSegs(p => ({ ...p, [next]: Math.min(p[next] + 0.005, 0.9) }));
    }, 7000);
    return () => clearInterval(t);
  }, [active]);
  return { state, segs };
}

/* ═══════════════ POMODORO HOOK ═══════════════ */
function usePomodoro() {
  const [config, setConfig] = useState(null);
  const [running, setRunning] = useState(false);
  const [isBreak, setIsBreak] = useState(false);
  const [secs, setSecs] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [done, setDone] = useState(0);
  const [completed, setCompleted] = useState(false);
  const doneRef = useRef(0);

  function start(cfg) {
    setConfig(cfg); setIsBreak(false); setDone(0); doneRef.current = 0;
    setCompleted(false); setElapsed(0);
    setSecs(cfg.mode === 'pomodoro' ? cfg.workMin * 60 : 0);
    setRunning(true);
  }
  function reset() { setRunning(false); setConfig(null); setIsBreak(false); setSecs(0); setElapsed(0); setDone(0); doneRef.current = 0; setCompleted(false); }

  useEffect(() => {
    if (!running || !config) return;
    if (config.mode === 'freeflow') {
      const t = setInterval(() => setElapsed(e => e + 1), 1000);
      return () => clearInterval(t);
    }
    const t = setInterval(() => {
      setSecs(s => {
        if (s <= 1) {
          if (!isBreak) {
            const nd = doneRef.current + 1; doneRef.current = nd; setDone(nd);
            if (config.totalPoms && nd >= config.totalPoms) { setRunning(false); setCompleted(true); return 0; }
            setIsBreak(true); return config.breakMin * 60;
          } else { setIsBreak(false); return config.workMin * 60; }
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [running, isBreak, config]);

  const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  function skip() {
    if (!config || config.mode !== 'pomodoro') return;
    if (isBreak) { setIsBreak(false); setSecs(config.workMin * 60); }
    else {
      const nd = doneRef.current + 1; doneRef.current = nd; setDone(nd);
      if (config.totalPoms && nd >= config.totalPoms) { setRunning(false); setCompleted(true); return; }
      setIsBreak(true); setSecs(config.breakMin * 60);
    }
  }
  return { config, running, setRunning, isBreak, secs, elapsed, fmt, done, skip, start, reset, completed };
}

/* ═══════════════ SESSION SETUP ═══════════════ */
function SessionSetup({ onStart }) {
  const [mode, setMode] = useState(null);
  const [wm, setWm] = useState(25); const [bm, setBm] = useState(5); const [pm, setPm] = useState(4);
  const cl = (v, lo, hi) => Math.max(lo, Math.min(hi, isNaN(v) ? lo : v));
  return (
    <div className="setup">
      {!mode && (
        <div className="mode-row">
          <button className="mode-btn pri" onClick={() => setMode('pom')}>🍅 Pomodoro</button>
          <button className="mode-btn" onClick={() => onStart({ mode: 'freeflow' })}>🌊 Libre</button>
        </div>
      )}
      {mode === 'pom' && (
        <div className="config-row">
          <div className="cfg-item">
            <span className="cfg-lbl">⏱</span>
            <input className="cfg-inp" type="number" min="1" max="120" value={wm} onChange={e => setWm(cl(+e.target.value, 1, 120))} />
            <span className="cfg-unit">min</span>
          </div>
          <div className="cfg-sep" />
          <div className="cfg-item">
            <span className="cfg-lbl">☕</span>
            <input className="cfg-inp" type="number" min="1" max="60" value={bm} onChange={e => setBm(cl(+e.target.value, 1, 60))} />
            <span className="cfg-unit">min</span>
          </div>
          <div className="cfg-sep" />
          <div className="cfg-item">
            <span className="cfg-lbl">🔁</span>
            <input className="cfg-inp" type="number" min="1" max="12" value={pm} onChange={e => setPm(cl(+e.target.value, 1, 12))} />
          </div>
          <div className="cfg-sep" />
          <button className="cfg-go" onClick={() => onStart({ mode: 'pomodoro', workMin: wm, breakMin: bm, totalPoms: pm })}>▶ Iniciar</button>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ SPARKLES ═══════════════ */
const SPARKS = [
  { tx: '-58px', ty: '-78px', c: '#4a8a6a', d: '1.2s', e: '★' },
  { tx: '62px',  ty: '-74px', c: '#b87e28', d: '1.4s', e: '✦' },
  { tx: '-88px', ty: '-22px', c: '#c85540', d: '1.0s', e: '✦' },
  { tx: '90px',  ty: '-18px', c: '#4a8a6a', d: '1.3s', e: '★' },
  { tx: '-44px', ty:  '78px', c: '#b87e28', d: '1.1s', e: '✦' },
  { tx: '48px',  ty:  '80px', c: '#4a8a6a', d: '1.5s', e: '★' },
];
function Sparkles() {
  return <>{SPARKS.map((s, i) => <div key={i} className="spark" style={{ '--tx': s.tx, '--ty': s.ty, '--d': s.d, color: s.c }}>{s.e}</div>)}</>;
}

/* ═══════════════ CAMERA MODAL ═══════════════ */
function CameraModal({ open, setOpen, camOn, setCamOn, state }) {
  if (!open) return null;
  const cfg = CFG[state];
  const fc = state === 'away' ? 'away' : state === 'social' ? 'distracted' : state === 'absent' ? 'absent' : '';
  return (
    <div className="cam-modal-wrap" onClick={e => { if (e.target === e.currentTarget) setOpen(false); }}>
      <div className="cam-modal">
        <div className="cam-head">
          <div className="cam-title">Detección facial</div>
          <button className="cam-x" onClick={() => setOpen(false)}>×</button>
        </div>
        <div className="cam-feed">
          {!camOn ? (
            <div className="cam-off-view">
              <div style={{ fontSize: 20, opacity: 0.3 }}>◉</div>
              <div>Cámara apagada</div>
              <button className="cam-on-btn" style={{ marginTop: 4 }} onClick={() => setCamOn(true)}>Activar</button>
            </div>
          ) : (
            <div className="cam-live-view">
              <div className="cam-scan" />
              <div className={`face-box ${fc}`}>
                <div className="fc tl" /><div className="fc tr" /><div className="fc bl" /><div className="fc br" />
              </div>
              <div className="rec" />
            </div>
          )}
        </div>
        {camOn && (
          <div className="cam-state-bar" style={{ background: cfg.bg, color: cfg.hex }}>
            <span>{cfg.icon}</span>
            <span style={{ flex: 1, fontWeight: 600 }}>{cfg.label}</span>
            <button className="cam-off-btn" onClick={() => setCamOn(false)}>Apagar</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ MONITOR VIEW ═══════════════ */
function MonitorView({ camOn, setCamOn, camOpen, setCamOpen }) {
  const pom = usePomodoro();
  const { state, segs } = useSim(pom.running);
  const idle = !pom.config;
  const isFreeflow = pom.config?.mode === 'freeflow';
  const totalPoms = pom.config?.totalPoms || 4;
  const cfg = CFG[state];
  const timerStr = isFreeflow ? pom.fmt(pom.elapsed) : pom.fmt(pom.secs);

  useEffect(() => {
    function onKey(e) {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT' && pom.config) {
        e.preventDefault(); pom.setRunning(r => !r);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [pom.config]);

  const ringSegs = [
    { color: CFG.working.hex, pct: segs.working },
    { color: CFG.away.hex,    pct: segs.away },
    { color: CFG.social.hex,  pct: segs.social },
    { color: CFG.absent.hex,  pct: segs.absent },
  ];
  const dots = Array.from({ length: Math.min(totalPoms, 8) }, (_, i) =>
    i < pom.done ? 'done' : i === pom.done && pom.running && !pom.isBreak ? 'curr' : 'empty'
  );

  return (
    <div className="monitor">
      {/* Ambient glow */}
      <div className="ambient" style={{
        background: idle ? CFG.working.hex : cfg.hex,
        opacity: pom.running ? 0.14 : 0.05,
      }} />

      {/* Ring */}
      <div className="ring-wrap">
        <Ring segs={ringSegs} idle={idle} />
        <div className="ring-center">
          <BrainMascot size={96} color={idle ? CFG.working.hex : pom.completed ? CFG.working.hex : cfg.hex} />
        </div>
      </div>

      {/* Info below ring */}
      <div className="ring-info">
        {idle ? (
          <>
            <div className="idle-title">Sin sesión activa</div>
            <div className="idle-hint">Elige un modo para empezar</div>
          </>
        ) : pom.completed ? (
          <>
            <div className="done-emoji" style={{fontSize:28}}>🎉</div>
            <div className="done-title">¡Sesión completada!</div>
          </>
        ) : (
          <>
            <div className={`timer${pom.isBreak ? ' brk' : isFreeflow ? ' free' : ''}`}>{timerStr}</div>
            <div className="timer-lbl">{isFreeflow ? (pom.running ? 'libre' : 'pausado') : pom.isBreak ? 'descanso' : 'pomodoro'}</div>
            {!isFreeflow && (
              <div className="state-chip" style={{ background: cfg.bg }}>
                <div className="state-chip-dot" style={{ background: cfg.hex }} />
                <span className="state-chip-label" style={{ color: cfg.hex }}>{cfg.label}</span>
              </div>
            )}
          </>
        )}
      </div>

      {/* Controls */}
      {idle ? (
        <SessionSetup onStart={pom.start} />
      ) : pom.completed ? (
        <div className="controls" style={{ position: 'relative' }}>
          <Sparkles />
          <button className="ctrl-btn pp" onClick={pom.reset}>↺ Nueva sesión</button>
        </div>
      ) : (
        <div className="controls">
          <div className="ctrl-row">
            <button className="ctrl-btn pp" onClick={() => pom.setRunning(r => !r)} disabled={pom.completed}>
              {pom.running ? '⏸ Pausar' : '▶ Continuar'}
              <span className="kbd">Space</span>
            </button>
            {!isFreeflow && (
              <button className="ctrl-btn sec" onClick={pom.skip} title={pom.isBreak ? 'Saltar descanso' : 'Saltar pomodoro'}>⤳ Saltar</button>
            )}
            <button className="ctrl-btn dng" onClick={pom.reset} title="Terminar sesión">✕</button>
          </div>
          {!isFreeflow && (
            <div className="pom-dots">
              {dots.map((d, i) => <div key={i} className={`pom-dot ${d}`} />)}
              <span className="pom-info">{pom.done}/{totalPoms} · {pom.config?.workMin}/{pom.config?.breakMin} min</span>
            </div>
          )}
        </div>
      )}

      {/* Camera */}
      {camOpen && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 100 }}>
          <CameraModal open={camOpen} setOpen={setCamOpen} camOn={camOn} setCamOn={setCamOn} state={state} />
        </div>
      )}
    </div>
  );
}

/* ═══════════════ METRICS VIEW ═══════════════ */
function MetricsView() {
  const [period, setPeriod] = useState('Hoy');
  const stats = [
    { label: 'Tiempo activo',  val: '4h 32m', delta: '+12%', up: true,  color: CFG.working.hex, pct: 0.72 },
    { label: 'Distracciones',  val: '23',     delta: '−5',   up: true,  color: CFG.away.hex,    pct: 0.38 },
    { label: 'Redes sociales', val: '18 min', delta: '+3m',  up: false, color: CFG.social.hex,  pct: 0.25 },
    { label: 'Ausencias',      val: '2',      delta: '=',    up: null,  color: CFG.absent.hex,  pct: 0.12 },
  ];
  const hourly = [
    { h: '9h',  w: 0.9,  a: 0.05, s: 0.04, ab: 0.01 },
    { h: '10h', w: 0.7,  a: 0.1,  s: 0.15, ab: 0.05 },
    { h: '11h', w: 0.8,  a: 0.1,  s: 0.05, ab: 0.05 },
    { h: '12h', w: 0.3,  a: 0.2,  s: 0.3,  ab: 0.2  },
    { h: '13h', w: 0.1,  a: 0.1,  s: 0.1,  ab: 0.7  },
    { h: '14h', w: 0.6,  a: 0.2,  s: 0.1,  ab: 0.1  },
    { h: '15h', w: 0.85, a: 0.05, s: 0.05, ab: 0.05 },
    { h: '16h', w: 0.75, a: 0.1,  s: 0.1,  ab: 0.05 },
    { h: '17h', w: 0.5,  a: 0.2,  s: 0.2,  ab: 0.1  },
  ];
  return (
    <div className="metrics">
      <div className="mhdr">
        <div>
          <div className="mhdr-title">Productividad</div>
          <div className="mhdr-sub">Sábado 25 de abril · Semana 17</div>
        </div>
        <div className="periods">
          {['Hoy', 'Semana', 'Mes'].map(p => (
            <div key={p} className={`period${period === p ? ' on' : ''}`} onClick={() => setPeriod(p)}>{p}</div>
          ))}
        </div>
      </div>

      <div className="streak-card">
        <div className="streak-fire"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1 C6 1 8 3 8 5 C8 6.5 7 7.5 6 8 C6 8 7 6.5 5.5 5.5 C4 4.5 4 6 4 7 C3 6 2.5 4.5 3.5 3 C4.5 1.5 6 1 6 1Z" fill="oklch(57% 0.18 25)"/></svg></div>
        <div>
          <div className="streak-num">3 días</div>
          <div className="streak-lbl">Racha actual · Mejor: 7 días</div>
        </div>
        <div className="streak-badge">RACHA ACTIVA</div>
      </div>

      <div className="stats-grid">
        {stats.map((s, i) => (
          <div key={i} className="stat-card">
            <div className="stat-top">
              <div className="stat-label">{s.label}</div>
              <div className="stat-ico" style={{ background: s.color }}/>
            </div>
            <div className="stat-val" style={{ color: s.color }}>{s.val}</div>
            <div className="stat-bar"><div className="stat-bar-fill" style={{ width: `${s.pct * 100}%`, background: s.color, opacity: 0.7 }} /></div>
            <div className="stat-delta" style={{
              background: s.up === null ? 'var(--surface-2)' : s.up ? 'oklch(52% 0.13 155 / 0.1)' : 'oklch(57% 0.18 25 / 0.1)',
              color: s.up === null ? 'var(--text-muted)' : s.up ? 'var(--green)' : 'var(--red)',
            }}>{s.delta} vs ayer</div>
          </div>
        ))}
      </div>

      <div className="tl-card">
        <div className="tl-head">
          <span className="tl-title">Actividad por hora</span>
          <div className="tl-legend">
            {Object.entries(CFG).map(([k, v]) => (
              <div key={k} className="tl-li"><div className="tl-dot" style={{ background: v.hex }} />{v.label}</div>
            ))}
          </div>
        </div>
        <div className="tl-bars">
          {hourly.map((d, i) => (
            <div key={i} className="tl-col">
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', gap: 2 }}>
                {[{ p: d.w, c: CFG.working.hex }, { p: d.a, c: CFG.away.hex }, { p: d.s, c: CFG.social.hex }, { p: d.ab, c: CFG.absent.hex }]
                  .map((s, j) => s.p > 0.02 && <div key={j} className="tl-seg" style={{ height: `${s.p * 100}%`, background: s.c, opacity: 0.82 }} />)}
              </div>
              <div className="tl-lbl">{d.h}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ JARS VIEW ═══════════════ */
function JarSVG({ color, fillPct }) {
  const W=80, H=100, bY=20, bH=H-28, fH=bH*fillPct, fY=bY+bH-fH;
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} fill="none" style={{position:'absolute',inset:0}}>
      <rect x="6" y={bY} width={W-12} height={bH} rx="10" fill="oklch(99.5% 0.004 60)" stroke="var(--border-2)" strokeWidth="1.5"/>
      {fH>3 && <rect x="7.5" y={fY} width={W-15} height={fH} rx="7" fill={color} opacity="0.15"/>}
      {fH>3 && <rect x="7.5" y={fY} width={W-15} height="5" rx="2.5" fill={color} opacity="0.48"/>}
      <rect x="11" y={bY+5} width="5" height={bH-10} rx="2.5" fill="white" opacity="0.38"/>
      <rect x="13" y="11" width={W-26} height="13" rx="5" fill="var(--surface-2)" stroke="var(--border)" strokeWidth="1.2"/>
      <rect x="11" y="2" width={W-22} height="11" rx="4" fill={color} opacity="0.28" stroke={color} strokeWidth="1" strokeOpacity="0.45"/>
    </svg>
  );
}

const MOCK_SESSIONS = [
  { id:1, date:'Hoy 10:30',   dur:'25m',    score:88, label:'Análisis de datos' },
  { id:2, date:'Hoy 09:00',   dur:'25m',    score:62, label:'Revisión código' },
  { id:3, date:'Ayer 16:45',  dur:'1h 12m', score:94, label:'Deep work' },
  { id:4, date:'Ayer 14:00',  dur:'25m',    score:38, label:'Emails' },
  { id:5, date:'Ayer 11:00',  dur:'50m',    score:76, label:'Prep reunión' },
  { id:6, date:'Lun 17:00',   dur:'25m',    score:95, label:'Arquitectura' },
  { id:7, date:'Lun 15:00',   dur:'25m',    score:55, label:'Revisión PRs' },
  { id:8, date:'Lun 11:30',   dur:'1h 02m', score:83, label:'Diseño sistema' },
];

function JarItem({ session }) {
  const c = session.score >= 80 ? CFG.working.hex : session.score >= 58 ? CFG.social.hex : CFG.away.hex;
  return (
    <div className="jar-item" title={`${session.label} · ${session.date} · ${session.dur}`}>
      <div className="jar-svg-wrap">
        <JarSVG color={c} fillPct={session.score/100}/>
        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',flexShrink:0}}>
          <BrainMascot size={40} color={c}/>
        </div>
      </div>
      <div className="jar-item-label">{session.label}</div>
      <div className="jar-item-meta">
        <span className="jar-item-score" style={{color:c}}>{session.score}%</span>
      </div>
      <div className="jar-item-date">{session.date}</div>
    </div>
  );
}

function JarsView() {
  const rows = [MOCK_SESSIONS.slice(0,4), MOCK_SESSIONS.slice(4)];
  return (
    <div className="jars-view">
      <div className="shelf-header">
        <div className="mhdr-title" style={{fontSize:16}}>Tarros de sesión</div>
        <div className="mhdr-sub">{MOCK_SESSIONS.length} sesiones · El nivel indica el porcentaje de foco</div>
      </div>
      {rows.map((row, ri) => (
        <React.Fragment key={ri}>
          <div className="shelf-row">
            {row.map(s => <JarItem key={s.id} session={s}/>)}
          </div>
          <div className="shelf-spacer"/>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ═══════════════ CAMERA VIEW ═══════════════ */
const CAM_LOG = [
  {time:'10:47', state:'working'},{time:'10:44', state:'social'},
  {time:'10:38', state:'working'},{time:'10:31', state:'absent'},{time:'10:28', state:'working'},
];

function CameraView({ camOn, setCamOn, globalState }) {
  const cfg = CFG[globalState];
  const fc = globalState==='away'?'away':globalState==='social'?'distracted':globalState==='absent'?'absent':'';
  return (
    <div className="camera-view">
      <div className="cam-big-feed">
        {!camOn ? (
          <div className="cam-off-view">
            <div style={{fontSize:26,opacity:0.22}}>◉</div>
            <div>Cámara apagada</div>
            <button className="cam-on-btn" style={{marginTop:6}} onClick={()=>setCamOn(true)}>Activar</button>
          </div>
        ) : (
          <div className="cam-live-view">
            <div className="cam-scan"/>
            <div className={`face-box ${fc}`}>
              <div className="fc tl"/><div className="fc tr"/><div className="fc bl"/><div className="fc br"/>
            </div>
            <div className="rec"/>
          </div>
        )}
      </div>
      <div className="cam-panel">
        <div className="cam-panel-state" style={{background:cfg.bg, color:cfg.hex}}>
          <span>{cfg.icon}</span>
          <span style={{flex:1}}>{camOn ? cfg.label : 'Detección inactiva'}</span>
          <button className={camOn?'cam-off-btn':'cam-on-btn'} onClick={()=>setCamOn(o=>!o)}>
            {camOn?'Apagar':'Activar'}
          </button>
        </div>
        <div className="cam-log">
          <div className="cam-log-title">Historial reciente</div>
          {CAM_LOG.map((l,i) => (
            <div key={i} className="cam-log-row">
              <div className="cam-log-dot" style={{background:CFG[l.state].hex}}/>
              <span style={{color:'var(--text-mid)',fontWeight:500,minWidth:36}}>{l.time}</span>
              <span>{CFG[l.state].icon} {CFG[l.state].label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ TWEAKS PANEL ═══════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "focus",
  "timer": "mono",
  "accent": "verde",
  "glow": "on"
}/*EDITMODE-END*/;
function TweaksPanel({ onClose }) {
  const [v, setV] = useState(TWEAK_DEFAULTS);
  function set(k, val) { const n = { ...v, [k]: val }; setV(n); window.parent.postMessage({ type: '__edit_mode_set_keys', edits: n }, '*'); }
  return (
    <div className="tweaks">
      <div className="tweaks-hdr">
        <div className="tweaks-title">Tweaks</div>
        <button className="tweaks-close" onClick={onClose}>×</button>
      </div>
      <div className="twk-row">
        <div className="twk-lbl">Fuente del timer</div>
        <div className="twk-opts">
          {['mono', 'sans'].map(f => <div key={f} className={`twk-opt${v.timer === f ? ' on' : ''}`} onClick={() => set('timer', f)}>{f === 'mono' ? 'JetBrains Mono' : 'Space Grotesk'}</div>)}
        </div>
      </div>
      <div className="twk-row">
        <div className="twk-lbl">Color de acento</div>
        <div className="twk-opts">
          {[['verde', '#4a8a6a'], ['azul', '#4a6a8a'], ['morado', '#6a4a8a']].map(([n, c]) => (
            <div key={n} className={`twk-opt${v.accent === n ? ' on' : ''}`} onClick={() => set('accent', n)} style={v.accent === n ? { background: c, borderColor: c } : {}}>{n}</div>
          ))}
        </div>
      </div>
      <div className="twk-row">
        <div className="twk-lbl">Animación de glow</div>
        <div className="twk-opts">
          {['on', 'off'].map(o => <div key={o} className={`twk-opt${v.glow === o ? ' on' : ''}`} onClick={() => set('glow', o)}>{o === 'on' ? 'Activado' : 'Desactivado'}</div>)}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App() {
  const [tab, setTab] = useState('monitor');
  const [globalState, setGlobalState] = useState('working');
  const [camOn, setCamOn] = useState(true);
  const [camOpen, setCamOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    const onState = e => { if (e.detail) setGlobalState(e.detail); };
    window.addEventListener('bc-state', onState);
    return () => window.removeEventListener('bc-state', onState);
  }, []);

  useEffect(() => {
    const onMsg = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const cfg = CFG[globalState];



  return (
    <div className="window">
      {/* ── SIDEBAR ── */}
      <div className="sidebar">
        <div className="sb-titlebar">
          <div className="tls"><div className="tl tl-r" /><div className="tl tl-y" /><div className="tl tl-g" /></div>
          <span className="brand">Brain<em>CODE</em></span>
        </div>

        {/* Score orb */}
        <div className="orb-wrap">
          <div className="orb">
            <div className="orb-num">72</div>
            <div className="orb-sub">score</div>
          </div>
          <div className="orb-stats">
            <div className="orb-time">4h 32m enfocado</div>
            <div className="orb-streak">3 días de racha</div>
          </div>
        </div>

        {/* Nav */}
        <nav className="nav">
          {[
            { id: 'monitor', icon: '◎', label: 'Monitor' },
            { id: 'metrics', icon: '≡', label: 'Métricas' },
            { id: 'jars',    icon: <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2.5" y="5.5" width="9" height="7" rx="2.5"/><rect x="3.5" y="3" width="7" height="3" rx="1.5"/><line x1="5.5" y1="3" x2="5.5" y2="5.5"/><line x1="8.5" y1="3" x2="8.5" y2="5.5"/></svg>, label: 'Jars' },
          ].map(n => (
            <button key={n.id} className={`nav-btn${tab === n.id ? ' active' : ''}`} onClick={() => setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
          <button className="nav-btn" onClick={() => setCamOpen(o => !o)}>
            <span className="nav-icon">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><rect x="1" y="4" width="14" height="10" rx="2.5"/><circle cx="8" cy="9" r="2.5"/><path d="M5.5 4L6.8 2H9.2L10.5 4"/></svg>
            </span>
            Cámara
          </button>
        </nav>

        {/* Bottom */}
        <div className="sb-bottom">
          <button className="cam-status" onClick={() => setCamOpen(o => !o)}>
            <div className={`cam-dot${camOn ? ' live' : ''}`} style={{ background: camOn ? cfg.hex : 'oklch(45% 0.02 60)' }} />
            <span>{camOn ? cfg.label : 'Cámara apagada'}</span>
          </button>
          <button className="cam-status" style={{ opacity: 0.45, cursor: 'default', pointerEvents: 'none' }}>
            <span className="nav-icon" style={{ fontSize: 13 }}>⚙</span>
            <span>Ajustes</span>
          </button>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main">
        <div className="main-bar">
          <span className="main-bar-title">
            { tab === 'monitor' ? 'Monitor de Sesión'
            : tab === 'metrics' ? 'Métricas de Productividad'
            : tab === 'jars'    ? 'Tarros de Sesión'
            :                     'Cámara' }
          </span>
          <span className="main-bar-sub">
            { tab === 'monitor' ? '· Detección en tiempo real'
            : tab === 'metrics' ? '· Sáb 25 abril'
            : tab === 'jars'    ? '· Historial de sesiones'
            :                     '· Detección facial' }
          </span>
          <button className="icon-btn" title="Notificaciones" aria-label="Notificaciones">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          </button>
        </div>

        {tab === 'monitor' && <MonitorView camOn={camOn} setCamOn={setCamOn} camOpen={camOpen} setCamOpen={setCamOpen} />}
        {tab === 'metrics' && <MetricsView />}
        {tab === 'jars'    && <JarsView />}
        {camOpen && tab !== 'monitor' && (
          <div style={{position:'absolute',inset:0,zIndex:100}}>
            <CameraModal open={camOpen} setOpen={setCamOpen} camOn={camOn} setCamOn={setCamOn} state={globalState}/>
          </div>
        )}

        {tweaksOpen && <TweaksPanel onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
